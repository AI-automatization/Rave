# Railway config — notification service (port 3007)
# Root Directory in Railway dashboard: / (repo root)
# Config File Path in Railway dashboard: services/notification/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/notification/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
