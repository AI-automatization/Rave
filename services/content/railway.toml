# Railway config — content service (port 3003)
# Root Directory in Railway dashboard: / (repo root)
# Config File Path in Railway dashboard: services/content/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/content/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
