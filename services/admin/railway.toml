# Railway config — admin service (port 3008)
# Root Directory in Railway dashboard: / (repo root)
# Config File Path in Railway dashboard: services/admin/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/admin/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
