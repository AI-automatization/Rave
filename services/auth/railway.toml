# Railway config — auth service (port 3001)
# Root Directory in Railway dashboard: / (repo root)
# Config File Path in Railway dashboard: services/auth/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/auth/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
